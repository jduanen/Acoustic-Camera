<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- app-icon tile, dark to match the live overlay UI's own dark chrome -->
  <rect x="2" y="2" width="124" height="124" rx="26" fill="url(#bg)"/>

  <!-- converging wavefronts: hot (source) at the apex, cooling outward toward the
       mic array below; same red-to-blue convention as the app's JET overlay -->
  <circle cx="64" cy="22" r="18" fill="url(#glow)"/>

  <path d="M 52.34 40.66 A 22 22 0 0 0 75.66 40.66"
        fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>
  <path d="M 42.80 55.92 A 40 40 0 0 0 85.20 55.92"
        fill="none" stroke="#facc15" stroke-width="8" stroke-linecap="round"/>
  <path d="M 33.27 71.18 A 58 58 0 0 0 94.73 71.18"
        fill="none" stroke="#22c55e" stroke-width="8" stroke-linecap="round"/>
  <path d="M 23.73 86.44 A 76 76 0 0 0 104.27 86.44"
        fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>

  <!-- detected source -->
  <circle cx="64" cy="22" r="7" fill="#fffbeb" stroke="#ef4444" stroke-width="2"/>

  <!-- mic array -->
  <circle cx="24"  cy="104" r="5" fill="#e2e8f0"/>
  <circle cx="44"  cy="104" r="5" fill="#e2e8f0"/>
  <circle cx="64"  cy="104" r="5" fill="#e2e8f0"/>
  <circle cx="84"  cy="104" r="5" fill="#e2e8f0"/>
  <circle cx="104" cy="104" r="5" fill="#e2e8f0"/>
</svg>
